services:
  app:
    container_name: broadcast-bandwidth-calculator
    build:
      context: .
      dockerfile: Dockerfile
    image: broadcast-bandwidth-calculator:main
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - EVENT_DATA_DIR=/data/events
    volumes:
      - /srv/broadcast-bandwidth-data:/data/events
